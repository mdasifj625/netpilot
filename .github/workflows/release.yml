name: Build & Release NetPilot APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: NetPilot
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.jvmargs="-Xmx4g"

jobs:
  build:
    name: Build Release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Extract App Version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --no-install

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      - name: Build Release APKs
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Organize APKs
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT="android/app/build/outputs/apk/release"
          DEST="release-apks"

          mkdir -p "$DEST"

          if [[ -f "$OUTPUT/app-universal-release.apk" ]]; then
            cp "$OUTPUT/app-universal-release.apk" \
              "$DEST/${APP_NAME}-${VERSION}.apk"
          elif [[ -f "$OUTPUT/app-release.apk" ]]; then
            cp "$OUTPUT/app-release.apk" \
              "$DEST/${APP_NAME}-${VERSION}.apk"
          fi

          [[ -f "$OUTPUT/app-armeabi-v7a-release.apk" ]] && \
            cp "$OUTPUT/app-armeabi-v7a-release.apk" \
            "$DEST/${APP_NAME}-armeabi-v7a-${VERSION}.apk"

          [[ -f "$OUTPUT/app-arm64-v8a-release.apk" ]] && \
            cp "$OUTPUT/app-arm64-v8a-release.apk" \
            "$DEST/${APP_NAME}-arm64-v8a-${VERSION}.apk"

          [[ -f "$OUTPUT/app-x86-release.apk" ]] && \
            cp "$OUTPUT/app-x86-release.apk" \
            "$DEST/${APP_NAME}-x86-${VERSION}.apk"

          [[ -f "$OUTPUT/app-x86_64-release.apk" ]] && \
            cp "$OUTPUT/app-x86_64-release.apk" \
            "$DEST/${APP_NAME}-x86_64-${VERSION}.apk"

          ls -lah "$DEST"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release-apks/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
